<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seuzaret — Pipeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-logo">Seuzaret<span>.</span></div>
    <input type="password" id="pw" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Accéder</button>
    <p id="login-error"></p>
  </div>
</div>

<div id="dashboard" style="display:none">

  <header>
    <div class="logo">Seuzaret<span>.</span></div>
    <div class="header-right">
      <span class="refresh-label">Actualisation dans <strong id="countdown">30</strong>s</span>
    </div>
  </header>

  <main>

    <!-- FUNNEL -->
    <div class="funnel" id="funnel"></div>

    <!-- KPIs -->
    <div class="kpis">
      <div class="kpi" id="kpi-hot-card">
        <div class="kpi-value" id="kpi-hot">—</div>
        <div class="kpi-label">Leads chauds</div>
      </div>
      <div class="kpi">
        <div class="kpi-value" id="kpi-conversion">—</div>
        <div class="kpi-label">Taux de conversion</div>
      </div>
      <div class="kpi">
        <div class="kpi-value" id="kpi-ca">—</div>
        <div class="kpi-label">CA total</div>
      </div>
      <div class="kpi accent">
        <div class="kpi-value" id="kpi-mrr">—</div>
        <div class="kpi-label">MRR</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="toolbar">
      <div class="filters">
        <select id="f-statut" onchange="filterTable()">
          <option value="">Tous les statuts</option>
          <option value="genere">Généré</option>
          <option value="envoye">Envoyé</option>
          <option value="ouvert">Ouvert</option>
          <option value="clique">Cliqué</option>
          <option value="repondu">Répondu</option>
          <option value="paye">Payé</option>
          <option value="livre">Livré</option>
          <option value="annule">Annulé</option>
        </select>
        <select id="f-secteur" onchange="filterTable()">
          <option value="">Tous les secteurs</option>
          <option value="restaurant">Restaurant</option>
          <option value="artisan">Artisan</option>
          <option value="beaute">Beauté</option>
        </select>
        <input id="f-search" placeholder="Rechercher nom ou ville...">
      </div>
      <span class="count-label" id="count-label"></span>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Secteur</th>
            <th>Ville</th>
            <th>Email</th>
            <th>Site</th>
            <th>Statut</th>
            <th>Offre</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </main>
</div>

<script src="app.js"></script>
</body>
</html>
